name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python files
        run: python -m compileall -q investment_system workflow alpha_memo_downloader alpha_wechat_downloader notion_wechat_downloader podcast_process micro_programs common_libs

      - name: Run tests
        run: pytest -q
