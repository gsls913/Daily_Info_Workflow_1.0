# Copy this file to config/config.yaml and adjust local paths and accounts.
# Do not commit config/config.yaml.

paths:
  obsidian_base_dir: "D:\\path\\to\\Obsidian\\Vault"
  investment_notes_base_dir: "D:\\path\\to\\Obsidian\\InvestmentNotes"
  obsidian_exe_path: "D:\\softwares\\Obsidian\\Obsidian.exe"
  obsidian_shortcut_staging_dir: "D:\\桌面文件\\系列功能动作\\Obsidian笔记\\新增待添加到utools"
  memo_base_dir: "C会议纪要"
  wechat_article_base_dir: "C微信文章"
  attachment_dir: "_overall\\_attachment"

retention:
  log_days: 30
  log_max_files_per_dir: 90
  workflow_error_log_max_kb: 1024
  report_days: 90
  report_max_files: 120
  task_state_days: 120
  task_state_max_entries: 5000
  tmp_days: 3
  memo_read_article_days: 90
  wechat_read_article_days: 30
  history_days: 90

alphapai:
  base_url: "https://alphapai-web.rabyte.cn"
  page_size: 50
  max_history_per_key: 100

wechat:
  new_account_download_count: 3
  max_download_per_account: 10
  max_history_per_account: 100
  history_clean_threshold: 150
  category_mapping:
    投资: "1-投资"
    宏观: "2-宏观"
    商业: "3-商业"
    科技: "4-科技"
    工作: "5-工作"
    其他: "6-其他"
  read_subfolders:
    - "1-投资"
    - "2-宏观"
    - "3-商业"
    - "4-科技"
    - "5-工作"
    - "6-其他"

podcast:
  base_dir: "C小宇宙"
  unread_folder_name: "未读"
  read_folder_name: "已读"
  audio_dir: "data\\podcast\\audio"
  transcript_dir: "data\\podcast\\transcripts"
  refresh_tingwu_login_each_run: true
  completed_transcript_page_size: 48
  completed_transcript_max_pages: 0
  max_completed_transcripts_per_run: 5
  read_article_days: 30
  auto_login_on_cookie_failure: true
  auto_login_wait_verification_seconds: 60
  delete_tingwu_record_after_process: true
  tingwu_list_page_size: 48
  transcript_chunk_size_chars: 80000
  ai_single_max_tokens: 12000
  ai_chunk_max_tokens: 8000
  ai_synthesis_max_tokens: 12000
  cleanup_raw_transcripts_after_process: true
  raw_transcript_retention_days: 7
  max_download_per_account: 5
  new_account_download_count: 3
  # 小宇宙播客账号已迁移到 data/config/set_config.xlsx 的 podcast_account sheet。
  # 这里保留运行参数，不再用 podcast.accounts 作为账号来源。

daily_digest:
  base_dir: "Cz日报周报"
  unread_folder_name: "未读"
  read_folder_name: "已读"
  max_input_chars: 120000
  chunk_chars: 80000
  max_tokens: 12000
  chunk_max_tokens: 7000
  synthesis_max_tokens: 12000

weekly_digest:
  max_tokens: 12000
  chunk_max_tokens: 7000
  synthesis_max_tokens: 12000

memo:
  new_source_download_count: 10
  max_download_per_source: 20
  read_subfolders:
    - "0-Inbox"
    - "1-转记"
    - "2-预约会议"
    - "3-宏观"
    - "4-策略"
    - "5-社会服务"
    - "6-商贸零售"
  tag_configs: []

notion:
  database_name: "微信收藏"
  property_downloaded: "是否已下载"
  value_downloaded: "已下载"
  property_url: "网址"
  property_title: "标题"
  page_size: 100

notion_link_collection:
  database_name: "网页收藏（仅存链接）"
  database_alias: "文章收藏（仅存链接）"
  property_stored: "是否已存到本地"
  value_stored: "已存到本地"
  value_failed: "3次存到本地失败"
  property_failure_count: "存本地失败次数"
  max_store_failures: 3
  property_url: "网址"
  property_title: "标题"
  output_dir: "B综合\\收藏文章"
  output_filename: "收藏文章合集.md"
  page_size: 100

safety:
  dry_run: false
  allow_local_delete: true
  allow_cloud_delete: true
  confirm_destructive_actions: true
  recycle_bin_dir: "D:\\softwares\\Obsidian\\MyNotes\\信息收集器\\_overall\\_recycle_bin"
  recycle_bin_retention_days: 10

ai:
  default_provider: "zhongxin"
  parallel_workers:
    modelscope: 5
    huoshan: 20
    minimax: 10
